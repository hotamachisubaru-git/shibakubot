name: Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Resolve release metadata
        id: release_meta
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");

            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const version = String(pkg.version || "").trim();
            if (!version) {
              core.setFailed("package.json version is missing.");
              return;
            }

            const tag = `v${version}`;
            const { owner, repo } = context.repo;

            core.setOutput("tag", tag);
            core.setOutput("bundle_dir", `shibakubot-${tag}`);

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              core.info(`Release ${tag} already exists. Skipping.`);
              core.setOutput("should_release", "false");
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Tag ${tag} already exists. Reusing it.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Created tag ${tag} at ${context.sha}.`);
            }

            core.setOutput("should_release", "true");

      - name: Install dependencies
        if: steps.release_meta.outputs.should_release == 'true'
        run: npm ci

      - name: Show release metadata
        if: steps.release_meta.outputs.should_release == 'true'
        run: |
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Tag: ${{ steps.release_meta.outputs.tag }}"
          echo "Version: $(node -p "require('./package.json').version")"

      - name: Build release bundle
        if: steps.release_meta.outputs.should_release == 'true'
        run: npm run release:bundle

      - name: Archive release bundle
        if: steps.release_meta.outputs.should_release == 'true'
        run: |
          cd release
          zip -r "${{ steps.release_meta.outputs.tag }}.zip" "${{ steps.release_meta.outputs.bundle_dir }}"

      - name: Publish GitHub Release
        if: steps.release_meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          files: release/${{ steps.release_meta.outputs.tag }}.zip

      - name: Skip duplicate release
        if: steps.release_meta.outputs.should_release != 'true'
        run: echo "Release already exists for package.json version. Nothing to publish."
