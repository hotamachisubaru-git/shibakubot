name: リリース

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: リリース情報を解決
        id: release_meta
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");

            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const version = String(pkg.version || "").trim();
            if (!version) {
              core.setFailed("package.json の version が未設定です。");
              return;
            }

            const tag = `v${version}`;
            const { owner, repo } = context.repo;

            core.setOutput("tag", tag);
            core.setOutput("bundle_dir", `shibakubot-${tag}`);

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              core.info(`Release ${tag} は既に存在するためスキップします。`);
              core.setOutput("should_release", "false");
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`Tag ${tag} は既に存在するため再利用します。`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
              core.info(`Tag ${tag} を ${context.sha} に作成しました。`);
            }

            core.setOutput("should_release", "true");

      - name: 依存関係をインストール
        if: steps.release_meta.outputs.should_release == 'true'
        run: npm ci

      - name: リリース情報を表示
        if: steps.release_meta.outputs.should_release == 'true'
        run: |
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Tag: ${{ steps.release_meta.outputs.tag }}"
          echo "Version: $(node -p "require('./package.json').version")"

      - name: リリースノートを生成
        if: steps.release_meta.outputs.should_release == 'true'
        run: |
          mkdir -p release
          node scripts/extract-release-notes.mjs > release/release-notes.md

      - name: リリースバンドルを作成
        if: steps.release_meta.outputs.should_release == 'true'
        run: npm run release:bundle

      - name: リリースバンドルを圧縮
        if: steps.release_meta.outputs.should_release == 'true'
        run: |
          cd release
          zip -r "${{ steps.release_meta.outputs.tag }}.zip" "${{ steps.release_meta.outputs.bundle_dir }}"

      - name: GitHub Release を公開
        if: steps.release_meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.tag }}
          body_path: release/release-notes.md
          files: release/${{ steps.release_meta.outputs.tag }}.zip

      - name: 重複リリースをスキップ
        if: steps.release_meta.outputs.should_release != 'true'
        run: echo "package.json の version に対応する Release は既に存在するため、公開をスキップします。"
